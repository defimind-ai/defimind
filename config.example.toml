# ─────────────────────────────────────────────────────────────────────────────
# Cleo configuration — copy this file to `config.toml` and edit.
#
#   cp config.example.toml config.toml
#
# config.toml is git-ignored (see .gitignore). Your RPC URL may contain an API
# key — keep it out of version control.
# ─────────────────────────────────────────────────────────────────────────────

# Your own RPC endpoint. The DeFiMind server reads chain state THROUGH this URL
# (bring-your-own-RPC). Use whatever provider you like (Alchemy, Infura, your own
# node, etc.). This is the only "credential" Cleo touches, and it never leaves
# your machine except as a parameter to the DeFiMind endpoint you call.
rpc_url = "https://eth-mainnet.example.com/v2/YOUR_KEY_HERE"

# The hosted DeFiMind MCP endpoint. Leave as-is unless you're self-hosting.
endpoint = "https://mcp.defimind.ai/mcp"

# How often to run a monitoring cycle, in seconds. 300 = every 5 minutes.
poll_interval_seconds = 300

# ── Pools to watch ───────────────────────────────────────────────────────────
# Add one [[pools]] block per pool. pool_type is "uniswap_v2" or "uniswap_v3".
# chain_id is an optional guard (the server checks the RPC is on that chain).

[[pools]]
label     = "USDC/WETH 0.05% (V3)"
address   = "0x88e6a0c2ddd26feeb64f039a2c41296fcb3f5640"
pool_type = "uniswap_v3"
chain_id  = 1

